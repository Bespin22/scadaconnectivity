<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SCADA – IP & PLC Connectivity Monitoring</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>SCADA Connectivity Application</h1>
  <nav>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('ip-management')">IP Management</button>
  </nav>
</header>

<!-- ================= HOME ================= -->
<section id="home" class="section">
  <h2>Home – Turbine Connectivity</h2>

  <label>Filter by Location:</label>
  <select id="location-filter">
    <option value="all">All</option>
  </select>

  <div id="home-status" class="box-container"></div>
</section>

<!-- ================= IP MANAGEMENT ================= -->
<section id="ip-management" class="section hidden">
  <h2>IP Management</h2>

  <h3>Add New Turbine</h3>
  <form id="add-ip-form" class="form-container">
    <input type="text" id="ipName" placeholder="Turbine Name" required />
    
    <input type="text" id="ipAddress" placeholder="SCADA IP"
      required onblur="autoFillPlcIp()" />
    
    <input type="text" id="plcIpAddress" placeholder="PLC IP (auto)" />
    
    <input type="text" id="ipTurbineType" placeholder="Type" required />
    <input type="text" id="ipTurbineLocation" placeholder="Location" required />
    
    <button type="submit">Add</button>
  </form>

  <h3>Bulk Upload</h3>
  <form id="bulk-upload-form">
    <input type="file" id="bulkFile" accept=".xlsx" required />
    <button type="submit">Upload</button>
  </form>

  <h3>Download</h3>
  <button id="download-ip-list">Download XLSX</button>

  <h3>Active Turbines</h3>
  <div id="ip-list" class="box-container"></div>

  <h3>Deleted Turbines</h3>
  <div id="deleted-ips" class="box-container"></div>
</section>

<script>
const API_BASE_URL = "http://localhost:3000";
let ipData = [];

/* ---------- AUTO PLC ---------- */
function autoFillPlcIp() {
  const ip = document.getElementById("ipAddress").value.trim();
  const parts = ip.split(".");
  if (parts.length !== 4) return;

  const last = parseInt(parts[3]);
  if (isNaN(last) || last <= 0) return;

  parts[3] = last - 1;
  document.getElementById("plcIpAddress").value = parts.join(".");
}

/* ---------- NAV ---------- */
function showSection(id) {
  document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

/* ---------- LOAD ---------- */
async function loadPingData() {
  try {
    const res = await fetch(`${API_BASE_URL}/ping`);
    ipData = await res.json();

    renderHome(ipData);
    renderIPList(ipData);
    populateFilter(ipData);
  } catch (err) {
    console.error("Load error:", err);
  }
}

/* ---------- HOME ---------- */
function renderHome(data) {
  const div = document.getElementById("home-status");

  const grouped = {};

  data.forEach(t => {
    if (!grouped[t.turbineLocation]) {
      grouped[t.turbineLocation] = [];
    }
    grouped[t.turbineLocation].push(t);
  });

  let html = "";

  Object.keys(grouped).sort().forEach(location => {
    html += `
      <div class="site-section">   <!-- ✅ FULL WIDTH BLOCK -->

        <div class="site-header">
          ${location} (${grouped[location].length} Turbines)
        </div>

        <div class="site-grid">
          ${grouped[location].map(t => `
            <div class="box modern-box">

              <div class="status ip ${t.ipStatus==="Connected"?"green":"red"}">
                IP: ${t.ip}
              </div>

              <div class="status plc ${t.plcStatus==="Connected"?"green":"red"}">
                PLC: ${t.plcIp || "N/A"}
              </div>

              <div class="box-label">
                <strong>${t.name}_${t.turbineType}</strong>
              </div>

            </div>
          `).join("")}
        </div>

      </div>
    `;
  });

  div.innerHTML = html;
}
/* ---------- FILTER ---------- */
function populateFilter(data) {
  const dropdown = document.getElementById("location-filter");
  const locs = [...new Set(data.map(d => d.turbineLocation))];

  dropdown.innerHTML = `<option value="all">All</option>`;
  locs.forEach(l=>{
    const opt = document.createElement("option");
    opt.value = l;
    opt.textContent = l;
    dropdown.appendChild(opt);
  });
}

document.getElementById("location-filter").addEventListener("change", function () {
  const val = this.value;
  const filtered = val === "all"
    ? ipData
    : ipData.filter(t => t.turbineLocation === val);

  renderHome(filtered);
});

/* ---------- IP LIST ---------- */
function renderIPList(data) {
  const div = document.getElementById("ip-list");

  div.innerHTML = data.map(t => `
    <div class="box">
      <p><strong>${t.name}</strong></p>
      <p>SCADA: ${t.ip}</p>
      <p>PLC: ${t.plcIp || "N/A"}</p>
      <p>${t.turbineType} | ${t.turbineLocation}</p>

      <button onclick="editIP('${t.name}','${t.ip}','${t.plcIp || ""}','${t.turbineType}','${t.turbineLocation}')">Edit</button>
      <button onclick="deleteIP('${t.ip}')">Delete</button>
    </div>
  `).join("");
}

/* ---------- DELETED ---------- */
async function fetchDeletedIPs() {
  try {
    const res = await fetch(`${API_BASE_URL}/deleted-ips`);
    const data = await res.json();

    document.getElementById("deleted-ips").innerHTML = data.map(t => `
      <div class="box">
        <p>${t.name}</p>
        <p>${t.ip}</p>
        <button onclick="restoreIP('${t.ip}')">Restore</button>
        <button onclick="permanentlyDeleteIP('${t.ip}')">Delete</button>
      </div>
    `).join("");
  } catch (err) {
    console.error("Deleted fetch error:", err);
  }
}

/* ---------- ADD ---------- */
document.getElementById("add-ip-form").addEventListener("submit", async e => {
  e.preventDefault();

  const payload = {
    name: document.getElementById("ipName").value,
    ip: document.getElementById("ipAddress").value,
    plcIp: document.getElementById("plcIpAddress").value || null,
    turbineType: document.getElementById("ipTurbineType").value,
    turbineLocation: document.getElementById("ipTurbineLocation").value
  };

  const res = await fetch(`${API_BASE_URL}/add-ip`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  if (res.ok) {
    alert("Added");
    e.target.reset();
    loadPingData();
  }
});

/* ---------- BULK ---------- */
document.getElementById("bulk-upload-form").addEventListener("submit", async e => {
  e.preventDefault();

  const fd = new FormData();
  fd.append("file", document.getElementById("bulkFile").files[0]);

  const res = await fetch(`${API_BASE_URL}/bulk-add`, {
    method: "POST",
    body: fd
  });

  const r = await res.json();
  alert(`Added:${r.added} Dup:${r.duplicates} Skip:${r.skipped}`);
  loadPingData();
});

/* ---------- DOWNLOAD ---------- */
document.getElementById("download-ip-list").onclick = () => {
  window.location = `${API_BASE_URL}/export-turbines`;
};

/* ---------- EDIT ---------- */
async function editIP(name, ip, plcIp, type, loc) {
  const newName = prompt("Name", name);
  const newIp = prompt("IP", ip);
  const newPlc = prompt("PLC", plcIp);
  const newType = prompt("Type", type);
  const newLoc = prompt("Location", loc);

  if (!newName || !newIp) return;

  await fetch(`${API_BASE_URL}/edit-ip`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      oldIp: ip,
      name: newName,
      ip: newIp,
      plcIp: newPlc,
      turbineType: newType,
      turbineLocation: newLoc
    })
  });

  loadPingData();
}

/* ---------- DELETE ---------- */
async function deleteIP(ip){
  await fetch(`${API_BASE_URL}/delete-ip/${ip}`,{method:"DELETE"});
  loadPingData();
  fetchDeletedIPs();
}

async function restoreIP(ip){
  await fetch(`${API_BASE_URL}/restore-ip/${ip}`,{method:"POST"});
  loadPingData();
  fetchDeletedIPs();
}

async function permanentlyDeleteIP(ip){
  await fetch(`${API_BASE_URL}/permanently-delete-ip/${ip}`,{method:"DELETE"});
  fetchDeletedIPs();
}

/* ---------- INIT ---------- */
loadPingData();
fetchDeletedIPs();
</script>

</body>
</html>
